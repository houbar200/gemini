<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atlas Plemen 2026</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #10b981;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0; font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
            align-items: center; justify-content: center;
            overflow: hidden; -webkit-user-select: none; user-select: none;
        }

        .app-container { width: 92%; max-width: 450px; text-align: center; }

        .card {
            background: var(--card); border-radius: 32px;
            padding: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
            min-height: 480px; display: flex; flex-direction: column;
            align-items: center; border: 1px solid #334155;
            position: relative;
        }

        .animal-img {
            width: 100%; height: 280px; object-fit: cover;
            border-radius: 22px; margin-bottom: 15px;
            background: #0f172a; border: 1px solid #334155;
            transition: opacity 0.3s ease-in-out;
        }

        #answer {
            font-size: 1.4rem; font-weight: 800; color: var(--primary);
            margin: 10px 0; min-height: 5rem; visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            line-height: 1.2; text-transform: uppercase;
        }

        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-reveal { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn-next { background: var(--primary); color: #0f172a; display: none; }
        .btn:active { transform: scale(0.95); opacity: 0.9; }

        .progress { font-size: 0.85rem; color: var(--text-dim); margin-top: 15px; font-weight: 600; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <img id="animal-image" class="animal-img" src="" alt="Načítám...">
        <div id="answer">???</div>
        <button id="reveal-btn" class="btn btn-reveal" onclick="reveal()">Kdo jsem?</button>
        <button id="next-btn" class="btn btn-next" onclick="nextQuestion()">Další karta ➔</button>
        <div class="progress" id="progress">Míchám 44 karet...</div>
    </div>
</div>

<script>
    // KOMPLETNÍ SEZNAM VŠECH 44 SOUBORŮ
    const seznamSouboru = [
        "Aberdeen Angus.jpg", "Awassi.JPG", "Belgické Modré.jpg", "Česká Červinka.png",
        "České bílé ušlechtilé.jpg", "Český Strakatý Skot.jpg", "Duroc.jpg", "Galloway.jpg",
        "Gasconne.png", "Hampshire.jpg", "Highland.jpg", "Holštýn.jpg", "Jersey.jpg",
        "Landrace.jpg", "Mangalica.jpg", "Oxford Down.jpg", "Piemontese.jpg", "Pietrain.jpg",
        "Přeštické černostrakaté.jpg", "Suffolk.jpg", "Arabský plnokrevník.jpg", "Brahmánka.jpg",
        "Českomoravský belgický kůň.jpg", "Český strakáč.jpg", "Hafling.webp", "Hedvábnička.jpg",
        "Hucul.jpg", "Indický běžec.jpg", "Koza anglonúbijská.jpg", "Koza Bílá Krátkosrtá.webp",
        "Koza hnědá krátkosrstá.webp", "Koza kašmírová.jpg", "Kůň Andaluský.jpg", 
        "Kůň starokladrubský.jpg", "Lipicán.webp", "Merinolandschaf.jpg", 
        "Moravský bílý hnědooký.jpg", "Ovce Jákobova.jpg", "Ovce Romanovská.webp", 
        "Slezský norik.jpg", "Percheron.webp", "Shetlandský pony.webp", "Texel.jpg", "Valaška.jpg"
    ];

    let quizData = [];
    let currentIndex = 0;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function prepareData() {
        quizData = seznamSouboru.map(soubor => {
            let jmeno = soubor.substring(0, soubor.lastIndexOf('.')); 
            return { name: jmeno, img: soubor };
        });
        shuffle(quizData);
    }

    function updateCard() {
        const animal = quizData[currentIndex];
        const imgElement = document.getElementById('animal-image');
        
        imgElement.style.opacity = 0;
        
        setTimeout(() => {
            imgElement.src = animal.img;
            imgElement.style.opacity = 1;
            document.getElementById('answer').innerText = animal.name;
            document.getElementById('answer').style.visibility = 'hidden';
            document.getElementById('reveal-btn').style.display = 'block';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('progress').innerText = `KARTA ${currentIndex + 1} / ${quizData.length}`;
        }, 250);
    }

    function reveal() {
        document.getElementById('answer').style.visibility = 'visible';
        document.getElementById('reveal-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
        if (navigator.vibrate) navigator.vibrate(40);
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex >= quizData.length) {
            alert("Gratuluji! Prošel jsi všech 44 plemen. Zamíchám je znovu.");
            currentIndex = 0;
            shuffle(quizData);
        }
        updateCard();
    }

    prepareData();
    updateCard();
</script>

</body>
</html>
