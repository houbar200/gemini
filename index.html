<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moje Super Appka</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#007AFF">

    <style>
        /* Základní reset a styl pro mobil */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            user-select: none; /* Zakáže označování textu, působí to víc jako appka */
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Horní lišta (Header) */
        header {
            background-color: #007AFF;
            color: white;
            padding: 50px 20px 15px; /* Vyšší padding nahoře kvůli výřezu mobilu */
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Hlavní obsah (Scrollable area) */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        button {
            width: 100%;
            background-color: #007AFF;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
            background-color: #0056b3;
        }

        /* Spodní navigace (Tab Bar) */
        footer {
            height: 80px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 15px; /* Místo pro spodní ovládací čáru mobilu */
        }

        .nav-item {
            text-align: center;
            font-size: 0.8rem;
            color: #888;
        }

        .nav-item.active {
            color: #007AFF;
        }

        .icon { font-size: 1.5rem; display: block; }
    </style>
</head>
<body>

    <header id="app-title">Moje Appka</header>

    <main>
        <div class="card">
            <h2>Vítej! 👋</h2>
            <p>Takhle vypadá moderní mobilní rozhraní vytvořené v HTML.</p>
        </div>

        <div class="card">
            <h3>Interaktivní test</h3>
            <p>Počet kliknutí: <strong id="counter">0</strong></p>
            <button onclick="increment()">Přidat bod</button>
        </div>

        <div class="card">
            <h3>Co dál?</h3>
            <p>Můžeme přidat foťák, mapy nebo ukládání dat do paměti mobilu.</p>
        </div>
    </main>

    <footer>
        <div class="nav-item active">
            <span class="icon">🏠</span> Domů
        </div>
        <div class="nav-item" onclick="alert('Sekce Úkoly')">
            <span class="icon">✅</span> Úkoly
        </div>
        <div class="nav-item" onclick="alert('Nastavení')">
            <span class="icon">⚙️</span> Nastavení
        </div>
    </footer>

    <script>
        // Jednoduchá funkce pro počítadlo
        let count = 0;
        function increment() {
            count++;
            document.getElementById('counter').innerText = count;
            
            // Malá vibrace (pokud to mobil podporuje)
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }
    </script>
</body>
</html>
