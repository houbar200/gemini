<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Investiční Vizionář</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #10b981; /* Investiční zelená */
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            margin: 0; font-family: -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
        }

        header {
            padding: 40px 20px 20px; background: var(--card);
            text-align: center; font-size: 1.2rem; font-weight: bold;
            border-bottom: 1px solid #334155;
        }

        main { flex: 1; overflow-y: auto; padding: 15px; }

        .card {
            background: var(--card); border-radius: 16px; padding: 18px;
            margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }

        input {
            width: 100%; background: #334155; border: 1px solid #475569;
            color: white; padding: 12px; border-radius: 8px;
            font-size: 1rem; margin-bottom: 15px; box-sizing: border-box;
        }

        .result-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin-top: 10px;
        }

        .result-box {
            background: rgba(16, 185, 129, 0.1);
            padding: 10px; border-radius: 10px; border: 1px solid var(--primary);
        }

        .result-val { display: block; font-size: 1.1rem; font-weight: bold; color: var(--primary); }
        .result-lbl { font-size: 0.7rem; color: #94a3b8; }

        canvas { margin-top: 20px; }
    </style>
</head>
<body>

<header>Investiční Simulátor</header>

<main>
    <div class="card">
        <label>Počáteční vklad (Kč)</label>
        <input type="number" id="initial" value="100000" oninput="calculate()">

        <label>Měsíční úložka (Kč)</label>
        <input type="number" id="monthly" value="5000" oninput="calculate()">

        <label>Roční zhodnocení (%)</label>
        <input type="number" id="rate" value="7" oninput="calculate()">

        <label>Doba investice (let)</label>
        <input type="number" id="years" value="20" oninput="calculate()">

        <label>Roční navyšování vkladu o (%) — <i>Step-up</i></label>
        <input type="number" id="stepup" value="3" oninput="calculate()">

        <label>Očekávaná inflace (%)</label>
        <input type="number" id="inflation" value="2" oninput="calculate()">
    </div>

    <div class="card">
        <h3>Výsledek simulace</h3>
        <div class="result-grid">
            <div class="result-box">
                <span class="result-lbl">Nominální hodnota</span>
                <span class="result-val" id="resTotal">0 Kč</span>
            </div>
            <div class="result-box">
                <span class="result-lbl">Dnešní kupní síla</span>
                <span class="result-val" id="resReal">0 Kč</span>
            </div>
            <div class="result-box">
                <span class="result-lbl">Celkem vloženo</span>
                <span class="result-val" id="resInvested">0 Kč</span>
            </div>
            <div class="result-box">
                <span class="result-lbl">Čistý zisk (po 15% dani)</span>
                <span class="result-val" id="resProfit">0 Kč</span>
            </div>
        </div>
        <canvas id="chart"></canvas>
    </div>
</main>

<script>
    let chart;

    function calculate() {
        let initial = parseFloat(document.getElementById('initial').value) || 0;
        let monthly = parseFloat(document.getElementById('monthly').value) || 0;
        let rate = (parseFloat(document.getElementById('rate').value) || 0) / 100 / 12;
        let years = parseInt(document.getElementById('years').value) || 0;
        let stepup = (parseFloat(document.getElementById('stepup').value) || 0) / 100;
        let inflation = (parseFloat(document.getElementById('inflation').value) || 0) / 100;

        let total = initial;
        let totalInvested = initial;
        let history = [initial];
        let labels = [0];

        let currentMonthly = monthly;

        for (let y = 1; y <= years; y++) {
            for (let m = 1; m <= 12; m++) {
                total = (total + currentMonthly) * (1 + rate);
                totalInvested += currentMonthly;
            }
            // Roční navýšení měsíčního vkladu (Step-up)
            currentMonthly *= (1 + stepup);
            history.push(Math.round(total));
            labels.push(y);
        }

        // Výpočet inflace (reálná hodnota peněz)
        let realValue = total / Math.pow(1 + inflation, years);
        let profit = total - totalInvested;
        let taxedProfit = profit > 0 ? profit * 0.85 : profit; // 15% daň ze zisku

        // Formátování čísel
        const fmt = (val) => new Intl.NumberFormat('cs-CZ').format(Math.round(val)) + " Kč";

        document.getElementById('resTotal').innerText = fmt(total);
        document.getElementById('resReal').innerText = fmt(realValue);
        document.getElementById('resInvested').innerText = fmt(totalInvested);
        document.getElementById('resProfit').innerText = fmt(taxedProfit);

        updateChart(labels, history);
    }

    function updateChart(labels, data) {
        if (chart) chart.destroy();
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Vývoj portfolia',
                    data: data,
                    borderColor: '#10b981',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(16, 185, 129, 0.1)'
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { 
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                }
            }
        });
    }

    calculate();
</script>
</body>
</html>
